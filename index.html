<!DOCTYPE html>
<html>
<head>
    <title>Sign Language AI Dashboard</title>
</head>
<body style="font-family:sans-serif; text-align:center">

    <h1>Sign Language System</h1>

    <button onclick="startDetection()">Start Detection</button>

    <h3>Add New Gesture</h3>
    <input id="gesture" placeholder="Enter gesture name"/>
    <button onclick="collect()">Collect Data</button>

    <h3>Train Model</h3>
    <button onclick="train()">Train</button>

    <h3>Status</h3>
    <p id="status">Idle</p>

    <script>
        async function startDetection() {
            await fetch('/start_detection');
        }

        async function collect() {
            let gesture = document.getElementById("gesture").value;
            await fetch('/collect', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({gesture})
            });
        }

        async function train() {
            await fetch('/train');
        }

        async function updateStatus() {
            let res = await fetch('/status');
            let data = await res.json();
            document.getElementById("status").innerText = data.mode;
        }

        setInterval(updateStatus, 1000);
    </script>

</body>
</html>
